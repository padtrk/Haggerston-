<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Haggerston — next trains</title>
<meta name="description" content="A friendly model-railway dashboard showing the next trains from Haggerston in both directions.">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #c8e4f0;
    --sky-top: #a8d2e8;
    --sky-low: #e8d8c0;
    --hill: #7fa85a;
    --hill-dark: #5e8438;
    --grass: #9bc06a;
    --track: #6b4226;
    --track-dark: #3d2410;
    --ink: #1a1a1a;
    --cream: #faf4e0;
    --red: #c94545;
    --blue: #4a7bb8;
    --warn: #e8a030;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--sky);
    color: var(--ink);
    font-family: 'Patrick Hand', 'Comic Sans MS', cursive;
    font-size: 17px;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    position: relative;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ============ TOP BAR ============ */
  .topbar {
    background: var(--cream);
    border-bottom: 3px solid var(--ink);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 20;
  }
  .topbar .title {
    font-family: 'Kalam', cursive;
    font-weight: 700;
    font-size: 26px;
    flex: 1;
  }
  .topbar .title::before { content: "🚂 "; }
  .topbar .clock {
    font-family: 'Kalam', cursive;
    font-weight: 700;
    font-size: 20px;
    background: white;
    padding: 4px 14px;
    border: 2px solid var(--ink);
    border-radius: 14px;
  }
  .refresh {
    background: white;
    border: 2px solid var(--ink);
    padding: 6px 14px;
    border-radius: 50px;
    font-family: 'Patrick Hand', cursive;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
  }
  .refresh:hover { transform: translate(1px, 1px); box-shadow: 1px 1px 0 rgba(0,0,0,0.15); }

  /* ============ MAIN STAGE ============ */
  .stage {
    flex: 1;
    display: grid;
    grid-template-rows: 1fr auto 1fr;
    min-height: 0;
    position: relative;
  }

  /* ============ SCENES (TOP & BOTTOM) ============ */
  .scene {
    position: relative;
    overflow: hidden;
  }
  .scene.top {
    background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky) 60%, #d0e0c8 100%);
  }
  .scene.bottom {
    background: linear-gradient(to bottom, #d0e0c8 0%, var(--grass) 60%, #8ab25a 100%);
  }
  .scene .sun {
    position: absolute;
    top: 10px;
    right: 30px;
    width: 56px;
    height: 56px;
    background: #fce98a;
    border: 3px solid var(--ink);
    border-radius: 50%;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.08);
  }
  .scene .cloud {
    position: absolute;
    width: 80px;
    height: 32px;
    background: white;
    border: 2.5px solid var(--ink);
    border-radius: 40px;
  }
  .scene .cloud::before, .scene .cloud::after {
    content: "";
    position: absolute;
    background: white;
    border: 2.5px solid var(--ink);
    border-radius: 50%;
  }
  .scene .cloud::before { width: 30px; height: 30px; top: -16px; left: 12px; }
  .scene .cloud::after { width: 22px; height: 22px; top: -10px; right: 14px; }
  .scene.top .cloud-1 { top: 20%; left: 18%; animation: drift 90s linear infinite; }
  .scene.top .cloud-2 { top: 40%; left: 60%; animation: drift 120s linear infinite; }

  /* rolling hills inside each scene */
  .scene svg.hills {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 60%;
    pointer-events: none;
  }

  /* ============ TRACK ============ */
  .scene .track {
    position: absolute;
    bottom: 18px;
    left: 0;
    right: 0;
    height: 30px;
  }
  .scene .track .ballast {
    position: absolute;
    top: 22px;
    left: 0; right: 0;
    height: 8px;
    background: #b8a880;
    opacity: 0.6;
  }
  .scene .track .sleepers {
    position: absolute;
    top: 14px;
    left: 0; right: 0;
    height: 10px;
    background: repeating-linear-gradient(
      to right,
      var(--track) 0,
      var(--track) 14px,
      transparent 14px,
      transparent 28px
    );
  }
  .scene .track .rail {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: var(--track-dark);
  }
  .scene .track .rail-1 { top: 4px; }
  .scene .track .rail-2 { top: 10px; }

  /* ============ TRAINS ============ */
  .train {
    position: absolute;
    bottom: 22px;
    width: 180px;
    height: 90px;
    transform-origin: bottom center;
  }
  .train svg { width: 100%; height: 100%; display: block; }

  /* Northbound train goes RIGHT → LEFT (in the top scene, "heading north" toward Dalston) */
  .train.north {
    animation: chugLeft 50s linear infinite;
    transform: scaleX(-1); /* flip so it faces left */
  }
  @keyframes chugLeft {
    0%   { right: -200px; }
    100% { right: 100vw; }
  }

  /* Southbound train goes LEFT → RIGHT */
  .train.south {
    animation: chugRight 50s linear infinite;
  }
  @keyframes chugRight {
    0%   { left: -200px; }
    100% { left: 100vw; }
  }

  .train .bob { animation: bob 0.4s ease-in-out infinite alternate; transform-origin: bottom center; }
  @keyframes bob {
    from { transform: translateY(0); }
    to { transform: translateY(-1.5px); }
  }
  .steam {
    position: absolute;
    top: -6px;
    left: 80px;
    width: 16px;
    height: 16px;
    background: white;
    border: 2px solid var(--ink);
    border-radius: 50%;
    opacity: 0;
    animation: puff 2s ease-out infinite;
  }
  .steam.s2 { animation-delay: 0.6s; left: 72px; }
  .steam.s3 { animation-delay: 1.2s; left: 88px; }
  @keyframes puff {
    0% { opacity: 0; transform: translate(0, 0) scale(0.5); }
    30% { opacity: 0.9; }
    100% { opacity: 0; transform: translate(-24px, -46px) scale(1.5); }
  }

  /* ============ CENTRE TIMETABLE ============ */
  .timetable {
    background: var(--cream);
    border-top: 4px solid var(--ink);
    border-bottom: 4px solid var(--ink);
    padding: 10px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.15);
    z-index: 10;
    max-height: 42vh;
    min-height: 180px;
    position: relative;
  }
  .timetable::before, .timetable::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 6px;
    background: repeating-linear-gradient(
      45deg,
      #1a1a1a 0 6px,
      var(--cream) 6px 12px
    );
    opacity: 0.4;
  }
  .timetable::before { top: -10px; }
  .timetable::after { bottom: -10px; }

  .direction {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .direction h3 {
    font-family: 'Kalam', cursive;
    font-weight: 700;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .direction.north h3 { color: var(--blue); }
  .direction.south h3 { color: var(--red); }
  .direction h3 .arrow { font-size: 20px; }
  .direction .sub {
    font-size: 13px;
    color: #666;
    font-style: italic;
    margin-bottom: 8px;
  }

  .next {
    background: white;
    border: 3px solid var(--ink);
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 6px;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.12);
  }
  .next .time {
    font-family: 'Kalam', cursive;
    font-weight: 700;
    font-size: 32px;
    line-height: 1;
  }
  .direction.north .next .time { color: var(--blue); }
  .direction.south .next .time { color: var(--red); }
  .next .to {
    font-size: 14px;
    color: #444;
    margin-top: 2px;
  }

  .upcoming-list {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    padding-right: 4px;
  }
  .upcoming-list::-webkit-scrollbar { width: 8px; }
  .upcoming-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 4px; }
  .upcoming-list::-webkit-scrollbar-thumb { background: var(--ink); border-radius: 4px; }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 2px;
    border-bottom: 1px dashed rgba(0,0,0,0.18);
    font-size: 14px;
  }
  .row:last-child { border-bottom: none; }
  .row .t {
    font-family: 'Kalam', cursive;
    font-weight: 700;
    font-size: 17px;
    min-width: 58px;
  }
  .direction.north .row .t { color: var(--blue); }
  .direction.south .row .t { color: var(--red); }
  .row .d {
    flex: 1;
    text-align: right;
    color: #555;
    padding-left: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .loading, .empty {
    padding: 12px;
    color: #888;
    font-style: italic;
    text-align: center;
  }
  .empty { color: var(--red); }

  /* on narrow screens, stack the columns */
  @media (max-width: 640px) {
    .timetable { grid-template-columns: 1fr; max-height: 48vh; }
    .train { width: 130px; height: 66px; }
    .direction .sub { display: none; }
  }

  .footer {
    position: absolute;
    bottom: 2px;
    left: 8px;
    font-size: 11px;
    color: rgba(0,0,0,0.4);
    font-style: italic;
  }
</style>

<script>
const STATION_ID = '910GHAGGERS';
const API_URL = `https://api.tfl.gov.uk/StopPoint/${STATION_ID}/Arrivals`;

// Southbound destinations (toward Whitechapel / south)
const SOUTH_KEYWORDS = ['Whitechapel', 'Shadwell', 'Surrey Quays', 'New Cross', 'Crystal Palace', 'West Croydon', 'Clapham Junction', 'Peckham'];
// Northbound destinations (toward Dalston / Highbury)
const NORTH_KEYWORDS = ['Dalston', 'Highbury', 'Islington', 'Stratford'];

function formatMins(seconds) {
  const mins = Math.round(seconds / 60);
  if (mins <= 0) return 'due';
  if (mins === 1) return '1 min';
  return mins + ' mins';
}

function classifyDirection(arrival) {
  // Platform name is most reliable ("Southbound - Platform 1" / "Northbound - Platform 2")
  if (arrival.platformName) {
    if (/south/i.test(arrival.platformName)) return 'south';
    if (/north/i.test(arrival.platformName)) return 'north';
  }
  const dest = (arrival.destinationName || arrival.towards || '').toLowerCase();
  if (SOUTH_KEYWORDS.some(k => dest.includes(k.toLowerCase()))) return 'south';
  if (NORTH_KEYWORDS.some(k => dest.includes(k.toLowerCase()))) return 'north';
  return 'unknown';
}

function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = `${hh}:${mm}`;
}

function renderDirection(dirKey, trains) {
  const nextEl = document.getElementById(dirKey + 'Next');
  const listEl = document.getElementById(dirKey + 'List');

  if (trains.length === 0) {
    nextEl.innerHTML = '';
    listEl.innerHTML = '<div class="empty">No trains showing</div>';
    return;
  }

  const next = trains[0];
  nextEl.innerHTML = `
    <div class="next">
      <div class="time">${formatMins(next.timeToStation)}</div>
      <div class="to">to ${next.destinationName || next.towards || 'unknown'}</div>
    </div>
  `;

  // Show the rest
  const rest = trains.slice(1);
  if (rest.length === 0) {
    listEl.innerHTML = '<div class="loading">No further trains in data</div>';
    return;
  }
  listEl.innerHTML = rest.map(t => `
    <div class="row">
      <span class="t">${formatMins(t.timeToStation)}</span>
      <span class="d">${t.destinationName || t.towards || '?'}</span>
    </div>
  `).join('');
}

async function loadArrivals() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('TfL returned ' + res.status);
    const data = await res.json();

    const north = data.filter(a => classifyDirection(a) === 'north').sort((a,b) => a.timeToStation - b.timeToStation);
    const south = data.filter(a => classifyDirection(a) === 'south').sort((a,b) => a.timeToStation - b.timeToStation);

    renderDirection('north', north);
    renderDirection('south', south);
  } catch (err) {
    document.getElementById('northList').innerHTML = `<div class="empty">Can't reach TfL: ${err.message}</div>`;
    document.getElementById('southList').innerHTML = '';
  }
}

updateClock();
setInterval(updateClock, 1000 * 30);
loadArrivals();
setInterval(loadArrivals, 30000);
</script>
</body>
</html>
