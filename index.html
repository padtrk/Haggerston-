<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Next train from Haggerston</title>
<meta name="description" content="A friendly morning dashboard showing the next train from Haggerston station, in the style of Ivor the Engine.">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #c8e4f0;
    --sky-top: #a8d2e8;
    --hill: #7fa85a;
    --hill-dark: #5e8438;
    --grass: #9bc06a;
    --track: #6b4226;
    --track-dark: #3d2410;
    --ink: #1a1a1a;
    --cream: #faf4e0;
    --red: #c94545;
    --warn: #e8a030;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--sky);
    color: var(--ink);
    font-family: 'Patrick Hand', 'Comic Sans MS', cursive;
    font-size: 18px;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    position: relative;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }

  /* ====== SKY & HILLS ====== */
  .scene {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky) 40%, #d8eaf0 60%, var(--grass) 82%, var(--grass) 100%);
  }
  .sun {
    position: absolute;
    top: 6%;
    right: 8%;
    width: 90px;
    height: 90px;
    background: #fce98a;
    border: 3px solid var(--ink);
    border-radius: 50%;
    box-shadow: 6px 6px 0 rgba(0,0,0,0.08);
  }
  .sun::before {
    content: "";
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    border: 2px solid rgba(26,26,26,0.3);
  }
  .cloud {
    position: absolute;
    width: 110px;
    height: 44px;
    background: white;
    border: 3px solid var(--ink);
    border-radius: 50px;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.08);
  }
  .cloud::before, .cloud::after {
    content: "";
    position: absolute;
    background: white;
    border: 3px solid var(--ink);
    border-radius: 50%;
  }
  .cloud::before {
    width: 40px; height: 40px;
    top: -22px; left: 16px;
  }
  .cloud::after {
    width: 30px; height: 30px;
    top: -14px; right: 20px;
  }
  .cloud-1 { top: 12%; left: 12%; animation: drift 80s linear infinite; }
  .cloud-2 { top: 22%; left: 45%; animation: drift 110s linear infinite; }
  .cloud-3 { top: 8%; left: 65%; animation: drift 95s linear infinite; }
  @keyframes drift {
    from { transform: translateX(-20vw); }
    to { transform: translateX(120vw); }
  }

  /* Hills in the background */
  .hills {
    position: absolute;
    bottom: 18%;
    left: 0;
    right: 0;
    height: 45%;
    pointer-events: none;
  }

  /* ====== TRACK ====== */
  .track {
    position: absolute;
    bottom: 14%;
    left: 0;
    right: 0;
    height: 40px;
  }
  .track .rail {
    position: absolute;
    left: 0; right: 0;
    height: 4px;
    background: var(--track-dark);
    border-top: 1px solid rgba(0,0,0,0.2);
  }
  .track .rail-1 { top: 6px; }
  .track .rail-2 { top: 14px; }
  .track .sleepers {
    position: absolute;
    top: 18px;
    left: 0;
    right: 0;
    height: 12px;
    background: repeating-linear-gradient(
      to right,
      var(--track) 0,
      var(--track) 16px,
      transparent 16px,
      transparent 32px
    );
  }
  .track .ballast {
    position: absolute;
    top: 30px;
    left: 0;
    right: 0;
    height: 10px;
    background: #b8a880;
    opacity: 0.6;
  }

  /* ====== TRAIN ====== */
  .train {
    position: absolute;
    bottom: 13%;
    left: -200px;
    width: 220px;
    height: 110px;
    animation: chug 45s linear infinite;
    transform-origin: bottom center;
  }
  .train svg {
    width: 100%;
    height: 100%;
  }
  @keyframes chug {
    0% { left: -220px; }
    100% { left: 100vw; }
  }
  .train .bob { animation: bob 0.4s ease-in-out infinite alternate; transform-origin: bottom center; }
  @keyframes bob {
    from { transform: translateY(0); }
    to { transform: translateY(-2px); }
  }
  .steam {
    position: absolute;
    top: -10px;
    left: 30px;
    width: 20px;
    height: 20px;
    background: white;
    border: 2px solid var(--ink);
    border-radius: 50%;
    opacity: 0;
    animation: puff 2s ease-out infinite;
  }
  .steam.s2 { animation-delay: 0.6s; left: 20px; }
  .steam.s3 { animation-delay: 1.2s; left: 40px; }
  @keyframes puff {
    0% { opacity: 0; transform: translate(0, 0) scale(0.5); }
    30% { opacity: 0.9; }
    100% { opacity: 0; transform: translate(-30px, -60px) scale(1.6); }
  }

  /* ====== INFO PANEL ====== */
  .panel {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%) rotate(-0.8deg);
    background: var(--cream);
    border: 4px solid var(--ink);
    border-radius: 14px;
    padding: 20px 36px;
    box-shadow: 8px 8px 0 rgba(0,0,0,0.15);
    text-align: center;
    max-width: 90%;
    min-width: 340px;
  }
  .panel::before {
    content: "";
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 18px;
    background: var(--cream);
    border: 4px solid var(--ink);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
  }
  .station-label {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #666;
    margin-bottom: 4px;
  }
  .station-name {
    font-family: 'Kalam', cursive;
    font-weight: 700;
    font-size: clamp(32px, 5vw, 48px);
    line-height: 1;
    margin-bottom: 14px;
  }
  .status-line {
    font-size: 20px;
    margin-bottom: 6px;
    color: #444;
  }
  .next-train {
    font-family: 'Kalam', cursive;
    font-weight: 700;
    font-size: clamp(42px, 7vw, 72px);
    line-height: 1;
    color: var(--red);
    margin: 6px 0;
  }
  .next-train.none { color: #888; font-size: clamp(28px, 4vw, 40px); }
  .destination {
    font-size: 22px;
    margin-top: 4px;
  }
  .destination b { font-weight: 700; }
  .tip {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 2px dashed #aaa;
    font-size: 16px;
    color: #555;
    font-style: italic;
  }
  .loading, .error {
    font-size: 20px;
    color: #888;
    padding: 10px 0;
  }
  .error { color: var(--red); }

  /* ====== UPCOMING LIST ====== */
  .upcoming {
    position: absolute;
    bottom: 4%;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border: 3px solid var(--ink);
    border-radius: 10px;
    padding: 10px 20px;
    box-shadow: 5px 5px 0 rgba(0,0,0,0.12);
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 15px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 92%;
    z-index: 5;
  }
  .upcoming .label {
    font-weight: 700;
    color: #666;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.12em;
  }
  .upcoming .item {
    background: var(--cream);
    border: 2px solid var(--ink);
    padding: 4px 10px;
    border-radius: 14px;
    white-space: nowrap;
  }
  .upcoming .item b { color: var(--red); }

  /* ====== REFRESH BUTTON ====== */
  .refresh {
    position: absolute;
    top: 20px;
    right: 20px;
    background: var(--cream);
    border: 3px solid var(--ink);
    padding: 8px 18px;
    border-radius: 50px;
    font-family: 'Patrick Hand', cursive;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    z-index: 10;
  }
  .refresh:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0 rgba(0,0,0,0.15); }
  .footer {
    position: absolute;
    bottom: 6px;
    left: 10px;
    font-size: 12px;
    color: rgba(0,0,0,0.4);
    font-style: italic;
  }

  @media (max-height: 640px) {
    .panel { top: 20px; padding: 14px 24px; }
    .station-name { font-size: 28px; margin-bottom: 8px; }
    .next-train { font-size: 42px; }
    .destination { font-size: 17px; }
    .tip { margin-top: 10px; padding-top: 8px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="scene">
    <div class="sun"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>

    <!-- rolling hills -->
    <svg class="hills" viewBox="0 0 1200 300" preserveAspectRatio="none">
      <path d="M0 220 Q150 140 300 180 Q450 220 600 160 Q750 110 900 170 Q1050 220 1200 150 L1200 300 L0 300 Z"
            fill="#7fa85a" stroke="#1a1a1a" stroke-width="3"/>
      <path d="M0 250 Q200 190 400 220 Q600 250 800 200 Q1000 160 1200 210 L1200 300 L0 300 Z"
            fill="#9bc06a" stroke="#1a1a1a" stroke-width="3"/>
      <!-- a tiny tree or two -->
      <g transform="translate(180, 200)">
        <rect x="-3" y="0" width="6" height="18" fill="#6b4226" stroke="#1a1a1a" stroke-width="2"/>
        <circle cx="0" cy="-4" r="14" fill="#5e8438" stroke="#1a1a1a" stroke-width="2.5"/>
      </g>
      <g transform="translate(820, 190)">
        <rect x="-3" y="0" width="6" height="18" fill="#6b4226" stroke="#1a1a1a" stroke-width="2"/>
        <circle cx="0" cy="-5" r="16" fill="#5e8438" stroke="#1a1a1a" stroke-width="2.5"/>
      </g>
      <!-- a little cottage -->
      <g transform="translate(520, 205)">
        <rect x="-16" y="-20" width="32" height="22" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
        <path d="M-20 -20 L0 -36 L20 -20 Z" fill="#c94545" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
        <rect x="-4" y="-12" width="8" height="14" fill="#6b4226" stroke="#1a1a1a" stroke-width="2"/>
      </g>
    </svg>

    <!-- track -->
    <div class="track">
      <div class="ballast"></div>
      <div class="sleepers"></div>
      <div class="rail rail-1"></div>
      <div class="rail rail-2"></div>
    </div>

    <!-- the train! -->
    <div class="train">
      <div class="bob">
        <div class="steam s1"></div>
        <div class="steam s2"></div>
        <div class="steam s3"></div>
        <svg viewBox="0 0 220 110" xmlns="http://www.w3.org/2000/svg">
          <!-- tender / coal car behind -->
          <rect x="4" y="50" width="50" height="40" fill="#5a3a2a" stroke="#1a1a1a" stroke-width="3"/>
          <rect x="10" y="54" width="38" height="8" fill="#2a1810"/>
          <circle cx="16" cy="94" r="8" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
          <circle cx="16" cy="94" r="3" fill="#888"/>
          <circle cx="42" cy="94" r="8" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
          <circle cx="42" cy="94" r="3" fill="#888"/>

          <!-- main body -->
          <rect x="54" y="48" width="100" height="42" rx="3" fill="#c94545" stroke="#1a1a1a" stroke-width="3"/>
          <!-- cab -->
          <rect x="130" y="30" width="40" height="60" rx="3" fill="#c94545" stroke="#1a1a1a" stroke-width="3"/>
          <!-- cab window -->
          <rect x="138" y="40" width="24" height="20" rx="2" fill="#a8d2e8" stroke="#1a1a1a" stroke-width="2.5"/>
          <!-- little face in the window: the driver -->
          <circle cx="150" cy="52" r="7" fill="#fce0a8" stroke="#1a1a1a" stroke-width="1.5"/>
          <circle cx="147" cy="51" r="1" fill="#1a1a1a"/>
          <circle cx="153" cy="51" r="1" fill="#1a1a1a"/>
          <path d="M147 55 Q150 57 153 55" stroke="#1a1a1a" stroke-width="1" fill="none"/>
          <!-- hat -->
          <path d="M143 46 L157 46 L155 42 L145 42 Z" fill="#1a1a1a"/>

          <!-- boiler details -->
          <circle cx="70" cy="68" r="6" fill="#f5c518" stroke="#1a1a1a" stroke-width="2.5"/>
          <rect x="90" y="32" width="14" height="18" fill="#c94545" stroke="#1a1a1a" stroke-width="2.5"/>
          <rect x="85" y="28" width="24" height="6" fill="#1a1a1a"/>
          <!-- dome -->
          <ellipse cx="115" cy="48" rx="9" ry="6" fill="#f5c518" stroke="#1a1a1a" stroke-width="2.5"/>

          <!-- wheels -->
          <circle cx="70" cy="94" r="12" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
          <circle cx="70" cy="94" r="4" fill="#888"/>
          <line x1="58" y1="94" x2="82" y2="94" stroke="#888" stroke-width="1.5"/>
          <line x1="70" y1="82" x2="70" y2="106" stroke="#888" stroke-width="1.5"/>

          <circle cx="110" cy="94" r="14" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
          <circle cx="110" cy="94" r="5" fill="#888"/>
          <line x1="96" y1="94" x2="124" y2="94" stroke="#888" stroke-width="1.5"/>
          <line x1="110" y1="80" x2="110" y2="108" stroke="#888" stroke-width="1.5"/>

          <circle cx="150" cy="94" r="12" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
          <circle cx="150" cy="94" r="4" fill="#888"/>
          <line x1="138" y1="94" x2="162" y2="94" stroke="#888" stroke-width="1.5"/>
          <line x1="150" y1="82" x2="150" y2="106" stroke="#888" stroke-width="1.5"/>

          <!-- coupling rod -->
          <line x1="70" y1="94" x2="150" y2="94" stroke="#555" stroke-width="2.5"/>

          <!-- front bumper -->
          <rect x="170" y="62" width="8" height="28" fill="#1a1a1a"/>
          <rect x="178" y="70" width="4" height="12" fill="#c94545" stroke="#1a1a1a" stroke-width="2"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- info panel -->
  <div class="panel">
    <div class="station-label">Next train from</div>
    <div class="station-name">Haggerston</div>
    <div id="status" class="loading">Checking the signals…</div>
  </div>

  <!-- upcoming -->
  <div class="upcoming" id="upcoming" style="display:none;">
    <span class="label">Then</span>
    <span id="upcomingItems"></span>
  </div>

  <button class="refresh" onclick="loadArrivals()">↻ Refresh</button>
  <div class="footer">Data: TfL Unified API. Unofficial. Not affiliated with TfL.</div>
</div>

<script>
// Haggerston NaPTAN
const STATION_ID = '910GHAGGERS';
const API_URL = `https://api.tfl.gov.uk/StopPoint/${STATION_ID}/Arrivals`;

// The direction you care about for getting to Westminster:
// southbound toward Whitechapel (change for District/Circle to Westminster)
const SOUTHBOUND_KEYWORDS = ['Whitechapel', 'Shadwell', 'Surrey Quays', 'New Cross', 'Crystal Palace', 'West Croydon', 'Clapham Junction'];

function formatMins(seconds) {
  const mins = Math.round(seconds / 60);
  if (mins <= 0) return 'due';
  if (mins === 1) return '1 min';
  return mins + ' mins';
}

function isSouthbound(arrival) {
  // Use platform name (e.g. "Southbound - Platform 1") first
  if (arrival.platformName && /south/i.test(arrival.platformName)) return true;
  if (arrival.platformName && /north/i.test(arrival.platformName)) return false;
  // Fallback: check destination against keywords
  const dest = arrival.destinationName || arrival.towards || '';
  return SOUTHBOUND_KEYWORDS.some(k => dest.includes(k));
}

async function loadArrivals() {
  const statusEl = document.getElementById('status');
  const upcomingEl = document.getElementById('upcoming');
  const upcomingItems = document.getElementById('upcomingItems');
  statusEl.className = 'loading';
  statusEl.textContent = 'Checking the signals…';
  upcomingEl.style.display = 'none';

  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('TfL API returned ' + res.status);
    const data = await res.json();

    // Filter for southbound, sort by time
    const southbound = data
      .filter(isSouthbound)
      .sort((a, b) => a.timeToStation - b.timeToStation);

    if (southbound.length === 0) {
      statusEl.className = 'error';
      statusEl.innerHTML = `
        <div class="next-train none">No trains showing</div>
        <div class="tip">Haggerston may be closed, or there are no live predictions right now. Try again shortly.</div>
      `;
      return;
    }

    const next = southbound[0];
    const mins = formatMins(next.timeToStation);
    const dest = next.destinationName || next.towards || 'unknown destination';

    statusEl.className = '';
    statusEl.innerHTML = `
      <div class="status-line">Next southbound train in</div>
      <div class="next-train">${mins}</div>
      <div class="destination">to <b>${dest}</b></div>
      <div class="tip">Change at Whitechapel for Westminster (District / Circle line)</div>
    `;

    // Show next few trains
    if (southbound.length > 1) {
      const more = southbound.slice(1, 4).map(t =>
        `<span class="item"><b>${formatMins(t.timeToStation)}</b> → ${t.destinationName || t.towards || '?'}</span>`
      ).join('');
      upcomingItems.innerHTML = more;
      upcomingEl.style.display = 'flex';
    }
  } catch (err) {
    statusEl.className = 'error';
    statusEl.innerHTML = `
      <div class="next-train none">Can't reach TfL</div>
      <div class="tip">${err.message}. Check your connection and try again.</div>
    `;
  }
}

loadArrivals();
// Auto-refresh every 30 seconds
setInterval(loadArrivals, 30000);
</script>
</body>
</html>
